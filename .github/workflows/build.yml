name: Build CirrusAudioFixup Kext

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workspace
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "PWD=$(pwd)"
          echo "Root contents"
          ls -la
          echo "Xcode project"
          ls -la CirrusAudioFixup.xcodeproj/ || echo "not found"

      - name: Xcode version
        run: xcodebuild -version

      - name: List targets
        run: xcodebuild -project CirrusAudioFixup.xcodeproj -list

      - name: Build release kext
        run: |
          xcodebuild \
            -project CirrusAudioFixup.xcodeproj \
            -target CirrusAudioFixup \
            -configuration Release \
            -sdk macosx \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="${GITHUB_WORKSPACE}/build/Release" \
            build

      - name: Verify kext
        run: |
          echo "Build output"
          ls -la build/Release/
          echo "Kext contents"
          ls -la build/Release/CirrusAudioFixup.kext/Contents/
          echo "Binary arch"
          file build/Release/CirrusAudioFixup.kext/Contents/MacOS/CirrusAudioFixup
          echo "Min OS version"
          otool -l build/Release/CirrusAudioFixup.kext/Contents/MacOS/CirrusAudioFixup \
            | grep -A3 "LC_VERSION_MIN\|LC_BUILD_VERSION" || true

      - name: Package kext
        run: |
          cd build/Release
          zip -r CirrusAudioFixup.zip CirrusAudioFixup.kext
          du -sh CirrusAudioFixup.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CirrusAudioFixup-${{ github.sha }}
          path: build/Release/CirrusAudioFixup.zip
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        run: |
          echo "Build successful"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "macOS: $(sw_vers -productVersion)"
          echo "Xcode: $(xcodebuild -version | head -1)"
